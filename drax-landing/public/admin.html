<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — DRAX Landing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #E87200;
      --orange-dark: #c96600;
      --bg: #f5f5f3;
      --card: #ffffff;
      --text: #1a1a1a;
      --text-2: #666660;
      --text-3: #999993;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.20);
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08);
      --green: #16a34a;
      --red: #dc2626;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .wrapper { max-width: 680px; margin: 0 auto; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.75rem; }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .logo em { color: var(--orange); font-style: normal; }
    .logo-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
    .view-link { font-size: 13px; color: var(--orange); text-decoration: none; padding: 7px 14px; border: 1px solid var(--orange); border-radius: 7px; transition: all .15s; }
    .view-link:hover { background: var(--orange); color: #fff; }

    /* Login */
    #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; }
    .login-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 340px; box-shadow: var(--shadow); text-align: center; }
    .login-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .login-card p { font-size: 13px; color: var(--text-2); margin-bottom: 1.5rem; }
    .login-input { width: 100%; font-size: 16px; padding: 10px 12px; border: 0.5px solid var(--border-md); border-radius: 8px; font-family: inherit; letter-spacing: 2px; text-align: center; margin-bottom: 10px; outline: none; transition: border-color .15s; }
    .login-input:focus { border-color: var(--orange); }
    .btn-full { width: 100%; padding: 12px; background: var(--orange); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; }
    .btn-full:hover { background: var(--orange-dark); }
    .error-msg { font-size: 13px; color: var(--red); margin-top: 8px; min-height: 18px; }

    /* Panel */
    #admin-panel { display: none; }
    .card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
    .card-title { font-size: 10px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 1rem; }
    .field { margin-bottom: 0.875rem; }
    .field:last-child { margin-bottom: 0; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 5px; }
    .field input[type=text], .field textarea { width: 100%; font-size: 14px; padding: 9px 11px; border: 0.5px solid var(--border-md); border-radius: 8px; font-family: inherit; color: var(--text); background: #fafaf8; outline: none; transition: border-color .15s; resize: vertical; }
    .field input[type=text]:focus, .field textarea:focus { border-color: var(--orange); }
    .field textarea { min-height: 72px; line-height: 1.5; }
    .hint { font-size: 11px; color: var(--text-3); margin-top: 4px; }

    /* Stats rows */
    .stat-row { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; margin-bottom: 8px; }
    .stat-row:last-child { margin-bottom: 0; }

    /* Image upload */
    .img-upload { display: flex; align-items: center; gap: 12px; }
    .img-preview { width: 72px; height: 54px; object-fit: cover; border-radius: 6px; border: 0.5px solid var(--border); background: #eeecea; flex-shrink: 0; }
    .img-preview.placeholder { display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .upload-btn { flex: 1; }
    .upload-btn label { display: block; width: 100%; text-align: center; padding: 9px 12px; border: 1.5px dashed var(--border-md); border-radius: 8px; font-size: 13px; color: var(--text-2); cursor: pointer; transition: all .15s; }
    .upload-btn label:hover { border-color: var(--orange); color: var(--orange); }
    .upload-btn input[type=file] { display: none; }
    .uploading { font-size: 12px; color: var(--text-3); margin-top: 4px; }

    /* Save bar */
    .save-bar { position: sticky; bottom: 1rem; display: flex; gap: 10px; align-items: center; background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 0.875rem 1.25rem; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
    .btn-save { flex: 1; padding: 11px; background: var(--orange); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; }
    .btn-save:hover { background: var(--orange-dark); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .save-status { font-size: 13px; font-weight: 500; min-width: 100px; text-align: right; }
    .save-status.ok { color: var(--green); }
    .save-status.err { color: var(--red); }

    .logout { font-size: 12px; color: var(--text-3); cursor: pointer; padding: 4px 8px; border-radius: 5px; border: 1px solid var(--border); background: none; font-family: inherit; }
    .logout:hover { color: var(--red); border-color: var(--red); }
  </style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div>
      <div class="logo">DRAX<em>.</em> <span style="font-size:13px;font-weight:400;color:var(--text-3)">Admin</span></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <a class="view-link" href="/" target="_blank">Ver landing ↗</a>
      <button class="logout" id="btn-logout" style="display:none" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-card">
      <h2>Panel Admin</h2>
      <p>Ingresá la contraseña para editar la landing</p>
      <input class="login-input" type="password" id="pwd-input" placeholder="••••••••" autocomplete="current-password">
      <button class="btn-full" onclick="doLogin()">Entrar</button>
      <div class="error-msg" id="login-error"></div>
    </div>
  </div>

  <!-- PANEL -->
  <div id="admin-panel">

    <!-- Hero -->
    <div class="card">
      <div class="card-title">Hero — Texto principal</div>
      <div class="field">
        <label>Tag (texto pequeño arriba del título)</label>
        <input type="text" id="f-hero-tag">
      </div>
      <div class="field">
        <label>Título principal</label>
        <textarea id="f-hero-title" rows="3"></textarea>
        <div class="hint">Usá \n para saltos de línea</div>
      </div>
      <div class="field">
        <label>Descripción</label>
        <textarea id="f-hero-desc" rows="3"></textarea>
      </div>
    </div>

    <!-- Stats -->
    <div class="card">
      <div class="card-title">Estadísticas (barra debajo del hero)</div>
      <div id="stats-fields"></div>
    </div>

    <!-- CTA Banner -->
    <div class="card">
      <div class="card-title">Banner CTA</div>
      <div class="field">
        <label>Título</label>
        <textarea id="f-cta-title" rows="2"></textarea>
        <div class="hint">Usá \n para saltos de línea</div>
      </div>
      <div class="field">
        <label>Descripción</label>
        <input type="text" id="f-cta-desc">
      </div>
    </div>

    <!-- WhatsApp -->
    <div class="card">
      <div class="card-title">WhatsApp</div>
      <div class="field">
        <label>Número (sin + ni espacios, con código de país)</label>
        <input type="text" id="f-whatsapp" placeholder="5491162992137">
        <div class="hint">Ejemplo: 5491162992137</div>
      </div>
    </div>

    <!-- Imágenes -->
    <div class="card">
      <div class="card-title">Imágenes</div>
      <div class="field">
        <label>Logo (navbar)</label>
        <div class="img-upload">
          <img class="img-preview" id="prev-logo" src="/images/logo.png" onerror="this.style.display='none'">
          <div class="upload-btn">
            <label>📁 Subir logo.png<input type="file" accept="image/*" onchange="uploadImage('logo', this)"></label>
            <div class="uploading" id="up-logo"></div>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Imagen hero (ambiente)</label>
        <div class="img-upload">
          <img class="img-preview" id="prev-ambiente" src="/images/ambiente.jpg" onerror="this.style.display='none'">
          <div class="upload-btn">
            <label>📁 Subir imagen<input type="file" accept="image/*" onchange="uploadImage('ambiente', this)"></label>
            <div class="uploading" id="up-ambiente"></div>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Panel WPC Interior</label>
        <div class="img-upload">
          <img class="img-preview" id="prev-wpc" src="/images/wpc.jpg" onerror="this.style.display='none'">
          <div class="upload-btn">
            <label>📁 Subir imagen<input type="file" accept="image/*" onchange="uploadImage('wpc', this)"></label>
            <div class="uploading" id="up-wpc"></div>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Panel WPC Exterior</label>
        <div class="img-upload">
          <img class="img-preview" id="prev-wpc_ext" src="/images/atornilladora.jpg" onerror="this.style.display='none'">
          <div class="upload-btn">
            <label>📁 Subir imagen<input type="file" accept="image/*" onchange="uploadImage('wpc_ext', this)"></label>
            <div class="uploading" id="up-wpc_ext"></div>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Placa UV Simil Mármol</label>
        <div class="img-upload">
          <img class="img-preview" id="prev-marmol" src="/images/marmol.jpg" onerror="this.style.display='none'">
          <div class="upload-btn">
            <label>📁 Subir imagen<input type="file" accept="image/*" onchange="uploadImage('marmol', this)"></label>
            <div class="uploading" id="up-marmol"></div>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Pisos SPC Click</label>
        <div class="img-upload">
          <img class="img-preview" id="prev-pisos" src="/images/pisos.jpg" onerror="this.style.display='none'">
          <div class="upload-btn">
            <label>📁 Subir imagen<input type="file" accept="image/*" onchange="uploadImage('pisos', this)"></label>
            <div class="uploading" id="up-pisos"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Save bar -->
    <div class="save-bar">
      <button class="btn-save" id="btn-save" onclick="saveContent()">Guardar cambios</button>
      <div class="save-status" id="save-status"></div>
    </div>

  </div><!-- /admin-panel -->
</div><!-- /wrapper -->

<script>
  let pwd = '';
  let content = {};

  // ── LOGIN ──
  document.getElementById('pwd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const p = document.getElementById('pwd-input').value.trim();
    if (!p) return;
    // Verificamos contra el servidor intentando cargar el contenido con esa contraseña
    try {
      const r = await fetch('/api/content');
      if (!r.ok) throw new Error();
      // Ahora verificamos la password con un POST vacío
      const test = await fetch('/api/content', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-pwd': p },
        body: JSON.stringify(await r.json())
      });
      if (test.status === 401) {
        document.getElementById('login-error').textContent = 'Contraseña incorrecta';
        return;
      }
      pwd = p;
      document.getElementById('login-error').textContent = '';
      loadPanel();
    } catch {
      document.getElementById('login-error').textContent = 'Error conectando al servidor';
    }
  }

  function logout() {
    pwd = '';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('btn-logout').style.display = 'none';
    document.getElementById('pwd-input').value = '';
  }

  // ── CARGAR PANEL ──
  async function loadPanel() {
    const r = await fetch('/api/content');
    content = await r.json();

    // Hero
    document.getElementById('f-hero-tag').value = content.hero?.tag || '';
    document.getElementById('f-hero-title').value = (content.hero?.title || '').replace(/<br>/g, '\n');
    document.getElementById('f-hero-desc').value = content.hero?.desc || '';

    // Stats
    const statsEl = document.getElementById('stats-fields');
    statsEl.innerHTML = (content.stats || []).map((s, i) => `
      <div class="stat-row">
        <div><label style="font-size:11px;color:var(--text-3)">Número</label>
          <input type="text" id="stat-num-${i}" value="${s.num}" style="width:100%;font-size:14px;padding:7px 10px;border:0.5px solid var(--border-md);border-radius:7px;font-family:inherit;outline:none;background:#fafaf8"></div>
        <div><label style="font-size:11px;color:var(--text-3)">Etiqueta</label>
          <input type="text" id="stat-lbl-${i}" value="${s.label}" style="width:100%;font-size:14px;padding:7px 10px;border:0.5px solid var(--border-md);border-radius:7px;font-family:inherit;outline:none;background:#fafaf8"></div>
      </div>
    `).join('');

    // CTA
    document.getElementById('f-cta-title').value = (content.cta?.title || '').replace(/<br>/g, '\n');
    document.getElementById('f-cta-desc').value = content.cta?.desc || '';

    // WhatsApp
    document.getElementById('f-whatsapp').value = content.whatsapp || '';

    // Mostrar panel
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    document.getElementById('btn-logout').style.display = 'block';
  }

  // ── GUARDAR ──
  async function saveContent() {
    const btn = document.getElementById('btn-save');
    const status = document.getElementById('save-status');
    btn.disabled = true;
    status.textContent = 'Guardando…';
    status.className = 'save-status';

    const statsCount = content.stats?.length || 0;
    const stats = [];
    for (let i = 0; i < statsCount; i++) {
      stats.push({
        num: document.getElementById(`stat-num-${i}`)?.value || '',
        label: document.getElementById(`stat-lbl-${i}`)?.value || ''
      });
    }

    const updated = {
      ...content,
      hero: {
        tag: document.getElementById('f-hero-tag').value,
        title: document.getElementById('f-hero-title').value,
        desc: document.getElementById('f-hero-desc').value
      },
      stats,
      cta: {
        title: document.getElementById('f-cta-title').value,
        desc: document.getElementById('f-cta-desc').value
      },
      whatsapp: document.getElementById('f-whatsapp').value
    };

    try {
      const r = await fetch('/api/content', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-pwd': pwd },
        body: JSON.stringify(updated)
      });
      if (r.ok) {
        content = updated;
        status.textContent = '✓ Guardado';
        status.className = 'save-status ok';
      } else {
        status.textContent = 'Error al guardar';
        status.className = 'save-status err';
      }
    } catch {
      status.textContent = 'Error de red';
      status.className = 'save-status err';
    }
    btn.disabled = false;
    setTimeout(() => { status.textContent = ''; status.className = 'save-status'; }, 3000);
  }

  // ── UPLOAD IMAGEN ──
  async function uploadImage(key, input) {
    const file = input.files[0];
    if (!file) return;
    const statusEl = document.getElementById('up-' + key);
    statusEl.textContent = 'Subiendo…';

    const form = new FormData();
    form.append('image', file);

    try {
      const r = await fetch('/api/upload/' + key, {
        method: 'POST',
        headers: { 'x-admin-pwd': pwd },
        body: form
      });
      const data = await r.json();
      if (data.ok) {
        // Actualizar preview
        const prev = document.getElementById('prev-' + key);
        if (prev) { prev.src = data.url + '?t=' + Date.now(); prev.style.display = 'block'; }
        // Actualizar content.images
        if (!content.images) content.images = {};
        content.images[key] = data.url;
        // Guardar automáticamente
        await saveContent();
        statusEl.textContent = '✓ Subida';
        setTimeout(() => statusEl.textContent = '', 2000);
      } else {
        statusEl.textContent = 'Error al subir';
      }
    } catch {
      statusEl.textContent = 'Error de red';
    }
  }
</script>
</body>
</html>
